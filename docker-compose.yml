services:
  backend:
    build: ./backend
    volumes:
      - ./data:/app/data:ro
    ports:
      - "8001:8001"
    restart: always

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always